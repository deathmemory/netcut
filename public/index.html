<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetCut · 网络剪切板</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
      NetCut
    </div>
    <div class="subtitle">跨设备网络剪切板</div>
  </header>

  <main>
    <!-- 粘贴 / 拖放区域 -->
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 16V4m0 0L8 8m4-4l4 4"/><path d="M20 16v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2"/>
        </svg>
      </div>
      <p class="drop-text">粘贴内容 <kbd>Ctrl+V</kbd> 或将文件拖放到此处</p>
      <p class="drop-sub">支持文本、图片、任意文件</p>
    </div>

    <!-- 文本输入快捷区 -->
    <div class="text-input-area">
      <textarea id="textInput" placeholder="直接在此输入或粘贴文本…" rows="3"></textarea>
      <button id="submitText" class="btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        保存
      </button>
    </div>

    <!-- 文件选择器 -->
    <div class="file-picker">
      <label class="btn-secondary" for="fileInput">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        选择文件上传
      </label>
      <input type="file" id="fileInput" multiple style="display:none">
    </div>

    <!-- 剪切板列表 -->
    <section class="items-section">
      <div class="section-header">
        <h2>剪切板内容</h2>
        <button id="clearAll" class="btn-danger-ghost" style="display:none">清空全部</button>
      </div>
      <div id="itemsGrid" class="items-grid">
        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/>
          </svg>
          <p>剪切板是空的</p>
          <span>粘贴内容或上传文件开始使用</span>
        </div>
      </div>
    </section>
  </main>

  <!-- Toast 提示 -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
