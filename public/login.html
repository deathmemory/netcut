<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · NetCut</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 44px 40px;
      width: 360px;
      text-align: center;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      font-size: 24px;
      font-weight: 700;
      color: #4f63e8;
      margin-bottom: 8px;
    }

    .logo svg { width: 26px; height: 26px; }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 32px;
    }

    input[type="password"] {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 16px;
      font-family: inherit;
      color: #1a202c;
      text-align: center;
      letter-spacing: 3px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      margin-bottom: 12px;
    }

    input[type="password"]:focus {
      border-color: #4f63e8;
      box-shadow: 0 0 0 3px rgba(79,99,232,.12);
    }

    input[type="password"]::placeholder { letter-spacing: 0; color: #cbd5e1; }

    button {
      width: 100%;
      background: #4f63e8;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }

    button:hover { background: #3b4fd4; }
    button:active { transform: scale(.98); }
    button:disabled { opacity: .6; cursor: default; }

    .error {
      margin-top: 14px;
      font-size: 13px;
      color: #ef4444;
      min-height: 18px;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
      </svg>
      NetCut
    </div>
    <p class="subtitle">跨设备网络剪切板</p>
    <input type="password" id="pwd" placeholder="请输入访问密码" autofocus>
    <button id="btn">进 入</button>
    <p class="error" id="err"></p>
  </div>
  <p class="footer">NetCut · 私有网络剪切板</p>

  <script>
    const pwd = document.getElementById('pwd');
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');

    async function login() {
      const password = pwd.value;
      if (!password) return;
      btn.disabled = true;
      err.textContent = '';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          err.textContent = '密码错误，请重试';
          pwd.value = '';
          pwd.focus();
        }
      } catch {
        err.textContent = '网络错误，请刷新重试';
      }
      btn.disabled = false;
    }

    btn.addEventListener('click', login);
    pwd.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
